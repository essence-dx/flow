name: Build dx-flow (Linux & macOS)

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PARENT: repo

jobs:
  linux-x86_64:
    name: Linux x64
    runs-on: blacksmith-2vcpu-ubuntu-2404
    defaults:
      run:
        working-directory: ${{ env.PARENT }}/flow
    steps:
      - name: Checkout flow
        uses: actions/checkout@v4
        with:
          path: ${{ env.PARENT }}/flow
      - name: Checkout serializer (path dependency)
        uses: actions/checkout@v4
        with:
          repository: essence-dx/serializer
          path: ${{ env.PARENT }}/serializer
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (ALSA, X11)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libasound2-dev libx11-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -j 8
      - uses: actions/upload-artifact@v4
        with:
          name: dx-flow-linux-x86_64
          path: ${{ env.PARENT }}/flow/target/release/flow

  linux-aarch64:
    name: Linux ARM64
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    defaults:
      run:
        working-directory: ${{ env.PARENT }}/flow
    steps:
      - name: Checkout flow
        uses: actions/checkout@v4
        with:
          path: ${{ env.PARENT }}/flow
      - name: Checkout serializer (path dependency)
        uses: actions/checkout@v4
        with:
          repository: essence-dx/serializer
          path: ${{ env.PARENT }}/serializer
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps (ALSA, X11)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libasound2-dev libx11-dev
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -j 8
      - uses: actions/upload-artifact@v4
        with:
          name: dx-flow-linux-aarch64
          path: ${{ env.PARENT }}/flow/target/release/flow

  macos:
    name: macOS (${{ matrix.target }})
    runs-on: blacksmith-6vcpu-macos-latest
    defaults:
      run:
        working-directory: ${{ env.PARENT }}/flow
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - name: Checkout flow
        uses: actions/checkout@v4
        with:
          path: ${{ env.PARENT }}/flow
      - name: Checkout serializer (path dependency)
        uses: actions/checkout@v4
        with:
          repository: essence-dx/serializer
          path: ${{ env.PARENT }}/serializer
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build for ${{ matrix.target }}
        run: cargo build --release -j 8 --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: dx-flow-${{ matrix.target }}
          path: ${{ env.PARENT }}/flow/target/${{ matrix.target }}/release/flow
